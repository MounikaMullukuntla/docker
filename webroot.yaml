# =============================================================================
# webroot.yaml — Platform-neutral config standard
# Site config lives here. Secrets live in .env
#
# Platform        Files replaced
# ──────────────  ──────────────────────────────────────────
# Netlify         netlify.toml, _redirects, _headers
# Vercel          vercel.json + next.config.js (hosting layer)
# Firebase        firebase.json (hosting section)
# Cloudflare      _headers, _redirects, wrangler.toml (routing)
#
# FALLBACK CHAIN (for build time, javascript or by your CLI tool):
#   1. {webroot}/webroot.yaml         ← site-specific overrides
#   2. {webroot}/docker/webroot.yaml  ← shared team-wide defaults (this file)
#   3. {webroot}/{repo}/webroot.yaml  ← shared code starter defaults


